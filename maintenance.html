<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Geçici olarak kapalı — Devret Link</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #f9fafb 0%, #f3f4f6 50%, #e5e7eb 100%);
            color: #1f2937;
        }
        .card {
            max-width: 28rem;
            text-align: center;
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #dc2626;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.35;
        }
        p {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.6;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">devret link</div>
        <div class="icon" aria-hidden="true">🔒</div>
        <h1>Site geçici olarak kapalıdır</h1>
        <p>Şu anda güncelleme ve bakım çalışması yapıyoruz. En kısa sürede yeniden hizmetinizde olacağız.</p>
    </div>
</body>
</html>
