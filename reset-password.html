<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Şifre Belirle - Devret Link</title>
    <link rel="stylesheet" href="styles.css?v=11">
    <link rel="stylesheet" href="login.css?v=3">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html" class="logo-main">devret link</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Reset Password Section -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-box" id="resetPasswordBox">
                <div class="login-header">
                    <h1>Yeni Şifre Belirle</h1>
                    <p>Yeni şifrenizi girin</p>
                </div>

                <form class="login-form" id="resetPasswordForm">
                    <div class="form-group">
                        <label>Yeni Şifre</label>
                        <div class="password-input">
                            <input type="password" name="password" id="newPassword" placeholder="En az 6 karakter" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Yeni Şifre (Tekrar)</label>
                        <div class="password-input">
                            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Şifrenizi tekrar girin" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Şifreyi Güncelle</button>
                </form>

                <div style="margin-top: 1rem; text-align: center;">
                    <a href="login.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">← Giriş sayfasına dön</a>
                </div>
            </div>

            <!-- Success Box -->
            <div class="login-box" id="successBox" style="display: none;">
                <div class="login-header">
                    <div class="verification-icon">✅</div>
                    <h1>Şifre Başarıyla Güncellendi</h1>
                    <p>Yeni şifrenizle giriş yapabilirsiniz.</p>
                </div>

                <button type="button" class="btn btn-primary btn-large" style="width: 100%;" onclick="window.location.href='login.html'">
                    Giriş Yap
                </button>
            </div>
        </div>
    </section>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Backend API -->
    <script src="backend/api.js"></script>
    
    <!-- Ana Script -->
    <script src="script.js"></script>

    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }
        
        // Reset password form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('❌ Şifreler eşleşmiyor!');
                return;
            }
            
            if (password.length < 6) {
                alert('❌ Şifre en az 6 karakter olmalıdır!');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Güncelleniyor...';
            
            try {
                const result = await updatePassword(password);
                
                if (result.success) {
                    document.getElementById('resetPasswordBox').style.display = 'none';
                    document.getElementById('successBox').style.display = 'block';
                } else {
                    alert('❌ Hata: ' + result.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Şifreyi Güncelle';
                }
            } catch (error) {
                console.error('❌ Şifre güncelleme hatası:', error);
                alert('❌ Hata: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Şifreyi Güncelle';
            }
        });
        
        // Check if user has valid reset token
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (!user) {
                    alert('❌ Geçersiz veya süresi dolmuş bağlantı. Lütfen yeni bir şifre sıfırlama isteği gönderin.');
                    window.location.href = 'login.html';
                    return;
                }
            } catch (error) {
                console.error('Kullanıcı kontrolü hatası:', error);
                alert('❌ Geçersiz veya süresi dolmuş bağlantı. Lütfen yeni bir şifre sıfırlama isteği gönderin.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
