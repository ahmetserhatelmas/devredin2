<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emlak İlanları - Devret Link</title>
    <link rel="stylesheet" href="styles.css?v=23">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-900); }

        /* HERO / SEARCH BAR */
        .search-hero {
            background: #fff;
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .search-hero-inner { max-width: 900px; margin: 0 auto; }
        .search-hero h1 { color: var(--gray-900); font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }

        /* Type Tabs */
        .type-tabs {
            display: flex; gap: 0.5rem; margin-bottom: 1rem;
        }
        .type-tab {
            padding: 0.6rem 1.5rem; border-radius: 8px 8px 0 0;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            border: 1px solid var(--gray-200); border-bottom: none; transition: all 0.2s;
            background: var(--gray-100); color: var(--gray-600);
        }
        .type-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Search Box */
        .search-box {
            background: #fff; border-radius: 0 12px 12px 12px;
            padding: 1rem 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap;
            align-items: flex-end;
        }
        .search-field { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 140px; }
        .search-field label { font-size: 0.75rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
        .search-field select,
        .search-field input {
            border: 1px solid var(--gray-300); border-radius: 8px;
            padding: 0.6rem 0.75rem; font-size: 0.9rem; color: var(--gray-900);
            background: #fff; outline: none;
        }
        .search-field select:focus, .search-field input:focus { border-color: var(--primary); }
        .search-btn {
            background: var(--primary); color: #fff; border: none; border-radius: 8px;
            padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
            transition: background 0.2s; white-space: nowrap;
        }
        .search-btn:hover { background: var(--primary-dark); }

        /* MAIN LAYOUT */
        .main { max-width: 1280px; margin: 2rem auto; padding: 0 1.5rem; display: flex; gap: 1.5rem; }

        /* SIDEBAR */
        .sidebar { width: 260px; flex-shrink: 0; }
        .filter-card {
            background: #fff; border-radius: 12px;
            border: 1px solid var(--gray-200); overflow: hidden; margin-bottom: 1rem;
        }
        .filter-card-header {
            padding: 0.9rem 1.1rem; font-weight: 700; font-size: 0.9rem;
            border-bottom: 1px solid var(--gray-100); color: var(--gray-800);
            display: flex; justify-content: space-between; align-items: center;
        }
        .filter-card-body { padding: 1rem; }
        .filter-group { margin-bottom: 1rem; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray-500); margin-bottom: 0.5rem; }
        .filter-group select,
        .filter-group input {
            width: 100%; border: 1px solid var(--gray-300); border-radius: 8px;
            padding: 0.55rem 0.75rem; font-size: 0.875rem; color: var(--gray-900); outline: none;
        }
        .filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }
        .price-range { display: flex; gap: 0.5rem; align-items: center; }
        .price-range input { flex: 1; }
        .price-range span { color: var(--gray-400); font-size: 0.8rem; }
        .checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-item input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .checkbox-item label { font-size: 0.85rem; color: var(--gray-700); cursor: pointer; }
        .btn-filter-apply {
            width: 100%; background: var(--primary); color: #fff; border: none;
            border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-filter-apply:hover { background: var(--primary-dark); }
        .btn-filter-reset {
            width: 100%; background: var(--gray-100); color: var(--gray-600); border: none;
            border-radius: 8px; padding: 0.6rem; font-size: 0.875rem; font-weight: 500;
            cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
        }
        .btn-filter-reset:hover { background: var(--gray-200); }

        /* LISTINGS AREA */
        .listings-area { flex: 1; min-width: 0; }
        .listings-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .results-count { font-size: 0.9rem; color: var(--gray-600); }
        .results-count strong { color: var(--gray-900); font-weight: 700; }
        .sort-select {
            border: 1px solid var(--gray-300); border-radius: 8px;
            padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; background: #fff;
        }
        .view-toggle { display: flex; gap: 0.35rem; }
        .view-btn {
            width: 36px; height: 36px; border: 1px solid var(--gray-300); background: #fff;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); transition: all 0.2s;
        }
        .view-btn.active { border-color: var(--primary); background: #fef2f2; color: var(--primary); }

        /* LISTING GRID */
        .listing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .listing-grid.list-view { grid-template-columns: 1fr; }

        /* CARD */
        .listing-card {
            background: #fff; border: 1px solid var(--gray-200); border-radius: 12px;
            overflow: hidden; transition: all 0.2s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .listing-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); border-color: var(--gray-300); }
        .card-img {
            width: 100%; height: 200px; object-fit: cover; background: var(--gray-100);
            display: block;
        }
        .card-img-placeholder {
            width: 100%; height: 200px; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center; color: var(--gray-400);
        }
        .card-img-wrapper {
            position: relative; overflow: hidden;
        }
        .card-badge-row {
            position: absolute; bottom: 0.5rem; left: 0.5rem;
            display: flex; gap: 0.4rem; flex-wrap: wrap;
        }
        .badge {
            padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
            display: inline-flex; align-items: center;
        }
        .badge-kiralik { background: #2563eb; color: #fff; }
        .badge-satilik { background: #16a34a; color: #fff; }
        .badge-featured { background: #f59e0b; color: #fff; }
        .badge-rooms { background: rgba(0,0,0,0.6); color: #fff; }
        .card-body { padding: 0.85rem; }
        .card-title { font-weight: 700; font-size: 0.95rem; color: var(--gray-900); margin-bottom: 0.35rem; line-height: 1.35; }
        .card-location { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.3rem; }
        .card-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 0.6rem; }
        .card-price span { font-size: 0.8rem; font-weight: 500; color: var(--gray-500); }
        .card-specs { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .card-spec { font-size: 0.78rem; color: var(--gray-600); display: flex; align-items: center; gap: 0.25rem; }

        /* List view card */
        .listing-grid.list-view .listing-card { display: flex; }
        .listing-grid.list-view .card-img { width: 220px; height: 160px; flex-shrink: 0; }
        .listing-grid.list-view .card-img-placeholder { width: 220px; height: 160px; flex-shrink: 0; }
        .listing-grid.list-view .card-img-wrapper { width: 220px; flex-shrink: 0; }
        .listing-grid.list-view .card-badge-row { bottom: 0.5rem; left: 0.5rem; }
        .listing-grid.list-view .card-body { display: flex; flex-direction: column; justify-content: center; flex: 1; }

        /* Loading & empty states */
        .state-msg {
            text-align: center; padding: 4rem 2rem; color: var(--gray-500);
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
        }
        .state-msg svg { opacity: 0.4; }
        .state-msg p { font-size: 0.95rem; }

        .skeleton { background: var(--gray-200); border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; gap: 0.4rem; margin-top: 2rem; }
        .page-btn {
            width: 36px; height: 36px; border: 1px solid var(--gray-300); background: #fff;
            border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 500;
            color: var(--gray-600); transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .page-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        /* SEARCHABLE DROPDOWN */
        .searchable-select { position: relative; }
        .search-dropdown {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: #fff; border: 1px solid var(--gray-300); border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 1000;
            max-height: 220px; overflow-y: auto;
        }
        .search-dropdown-item {
            padding: 0.6rem 0.75rem; font-size: 0.875rem; cursor: pointer;
            color: var(--gray-800); transition: background 0.15s;
        }
        .search-dropdown-item:hover, .search-dropdown-item.highlighted { background: #fef2f2; color: var(--primary); }
        .search-dropdown-empty { padding: 0.75rem; font-size: 0.875rem; color: var(--gray-400); text-align: center; }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .type-tab { padding: 0.5rem 1rem; font-size: 0.8rem; }
            .search-box { border-radius: 12px; }
            .search-field { min-width: 130px; }
            .listing-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<!-- SEARCH HERO -->
<div class="search-hero">
    <div class="search-hero-inner">
        <h1>Konut İlanları</h1>
        <div class="type-tabs">
            <button class="type-tab active" id="tabKiralik" onclick="setType('kiralik')">Kiralık</button>
            <button class="type-tab" id="tabSatilik" onclick="setType('satilik')">Satılık</button>
        </div>
        <div class="search-box">
            <div class="search-field" style="position:relative;">
                <label>Şehir</label>
                <div class="searchable-select" id="citySelectWrapper">
                    <input type="text" id="searchCityInput" placeholder="İl seçin veya yazın..." autocomplete="off"

                    <input type="hidden" id="searchCity">
                    <div id="cityOptionsList" class="search-dropdown" style="display:none;"></div>

            <div class="search-field" style="position:relative;">
                <label>İlçe</label>

                    <input type="text" id="searchDistrictInput" placeholder="Önce şehir seçin..." autocomplete="off" disabled

                        <div class="checkbox-item"><input type="checkbox" value="3+1" id="r3"><label for="r3">3+1</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="4+1" id="r4"><label for="r4">4+1</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="5+1" id="r5"><label for="r5">5+1 ve üzeri</label></div>
                    </div>
                </div>

                <div class="filter-group">
                    <label id="sidebarPriceLabel">Kira Aralığı (₺)</label>
                    <div class="price-range">
                        <input type="number" id="filterMinPrice" placeholder="Min">
                        <span>—</span>
                        <input type="number" id="filterMaxPrice" placeholder="Max">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Metrekare (m²)</label>
                    <div class="price-range">
                        <input type="number" id="filterMinArea" placeholder="Min">
                        <span>—</span>
                        <input type="number" id="filterMaxArea" placeholder="Max">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Bina Yaşı</label>
                    <select id="filterBuildingAge">
                        <option value="">Tümü</option>
                        <option value="0-5">0-5 Yıl</option>
                        <option value="5-10">5-10 Yıl</option>
                        <option value="10-15">10-15 Yıl</option>
                        <option value="15-20">15-20 Yıl</option>
                        <option value="20+">20+ Yıl</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Özellikler</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item"><input type="checkbox" id="fElevator"><label for="fElevator">Asansör</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="fParking"><label for="fParking">Otopark</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="fFurnished"><label for="fFurnished">Eşyalı</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="fComplex"><label for="fComplex">Site İçinde</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="fPets"><label for="fPets">Evcil Hayvan</label></div>
                    </div>
                </div>

                <button class="btn-filter-apply" onclick="applyFilters()">Filtrele</button>
                <button class="btn-filter-reset" onclick="resetFilters()">Filtreleri Temizle</button>
            </div>
        </div>
    </aside>

    <!-- LISTINGS AREA -->
    <div class="listings-area">
        <div class="listings-header">
            <p class="results-count" id="resultsCount">Yükleniyor...</p>
            <div style="display:flex;gap:0.75rem;align-items:center;">
                <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                    <option value="created_at_desc">En Yeni</option>
                    <option value="price_asc">En Düşük Fiyat</option>
                    <option value="price_desc">En Yüksek Fiyat</option>
                    <option value="area_desc">En Büyük m²</option>
                </select>
                <div class="view-toggle">
                    <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                    <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="Liste">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="listing-grid" id="listingGrid"></div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="backend/api.js"></script>
<script src="js/turkey-cities.js"></script>
<script src="script.js"></script>
<script src="js/auth.js"></script>
<script>
    let currentType = 'kiralik';
    let currentView = 'grid';
    let currentPage = 1;
    const PAGE_SIZE = 12;

    function toggleMobileMenu() {
        document.querySelector('.nav-menu').classList.toggle('active');
    }
    function toggleSearch() {
        window.location.href = 'listings.html';
    }

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', async () => {
        await checkAuth();
        const params = new URLSearchParams(window.location.search);
        if (params.get('type') === 'satilik') setType('satilik');

        // Searchable dropdown'ları başlat
        initSearchableDropdowns();

        applyFilters();
    });

    // ---- Searchable City/District Dropdowns ----
    let allCities = [];
    let allDistricts = [];

    function initSearchableDropdowns() {
        allCities = Object.keys(TURKEY_CITIES).sort();

        // Dışarı tıklayınca kapat
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#citySelectWrapper')) closeCityDropdown();
            if (!e.target.closest('#districtSelectWrapper')) closeDistrictDropdown();
        });
    }

    // --- CITY ---
    function openCityDropdown() {
        renderCityOptions(document.getElementById('searchCityInput').value);
        document.getElementById('cityOptionsList').style.display = '';
    }
    function closeCityDropdown() {
        document.getElementById('cityOptionsList').style.display = 'none';
    }
    function filterCityOptions() {
        renderCityOptions(document.getElementById('searchCityInput').value);
        document.getElementById('cityOptionsList').style.display = '';
        // Eğer input temizlendiyse şehiri sıfırla
        if (!document.getElementById('searchCityInput').value) {
            document.getElementById('searchCity').value = '';
            resetDistrictDropdown();
            applyFiltersDebounced();
        }
    }
    function renderCityOptions(query) {
        const list = document.getElementById('cityOptionsList');
        const q = query.toLowerCase().trim();
        const filtered = q ? allCities.filter(c => c.toLowerCase().includes(q)) : allCities;
        if (filtered.length === 0) {
            list.innerHTML = '<div class="search-dropdown-empty">Sonuç bulunamadı</div>';
        } else {
            list.innerHTML = filtered.map(c =>
                `<div class="search-dropdown-item" onclick="selectCity('${c}')">${c}</div>`
            ).join('');
        }
    }
    function selectCity(city) {
        document.getElementById('searchCityInput').value = city;
        document.getElementById('searchCity').value = city;
        closeCityDropdown();
        // İlçe dropdown'unu aç
        allDistricts = (TURKEY_CITIES[city] || []).sort();
        document.getElementById('searchDistrictInput').disabled = false;
        document.getElementById('searchDistrictInput').placeholder = 'İlçe seçin veya yazın...';
        document.getElementById('searchDistrictInput').value = '';
        document.getElementById('searchDistrict').value = '';
        applyFiltersDebounced();
    }

    // --- DISTRICT ---
    function openDistrictDropdown() {
        if (!document.getElementById('searchCity').value) return;
        renderDistrictOptions(document.getElementById('searchDistrictInput').value);
        document.getElementById('districtOptionsList').style.display = '';
    }
    function closeDistrictDropdown() {
        document.getElementById('districtOptionsList').style.display = 'none';
    }
    function filterDistrictOptions() {
        renderDistrictOptions(document.getElementById('searchDistrictInput').value);
        document.getElementById('districtOptionsList').style.display = '';
        if (!document.getElementById('searchDistrictInput').value) {
            document.getElementById('searchDistrict').value = '';
            applyFiltersDebounced();
        }
    }
    function renderDistrictOptions(query) {
        const list = document.getElementById('districtOptionsList');
        const q = query.toLowerCase().trim();
        const filtered = q ? allDistricts.filter(d => d.toLowerCase().includes(q)) : allDistricts;
        if (filtered.length === 0) {
            list.innerHTML = '<div class="search-dropdown-empty">Sonuç bulunamadı</div>';
        } else {
            list.innerHTML = filtered.map(d =>
                `<div class="search-dropdown-item" onclick="selectDistrict('${d}')">${d}</div>`
            ).join('');
        }
    }
    function selectDistrict(district) {
        document.getElementById('searchDistrictInput').value = district;
        document.getElementById('searchDistrict').value = district;
        closeDistrictDropdown();
        applyFiltersDebounced();
    }
    function resetDistrictDropdown() {
        allDistricts = [];
        document.getElementById('searchDistrictInput').value = '';
        document.getElementById('searchDistrictInput').disabled = true;
        document.getElementById('searchDistrictInput').placeholder = 'Önce şehir seçin...';
        document.getElementById('searchDistrict').value = '';
    }

    // Eski fonksiyon - artık kullanılmıyor ama referans kalabilir
    function onSearchCityChange() {}

    // ---- Type Toggle ----
    function setType(type) {
        currentType = type;
        currentPage = 1;
        document.getElementById('tabKiralik').classList.toggle('active', type === 'kiralik');
        document.getElementById('tabSatilik').classList.toggle('active', type === 'satilik');

        const label = type === 'kiralik' ? 'Maks. Kira (₺)' : 'Maks. Fiyat (₺)';
        const sidebarLabel = type === 'kiralik' ? 'Kira Aralığı (₺)' : 'Fiyat Aralığı (₺)';
        document.getElementById('priceLabel').textContent = label;
        document.getElementById('sidebarPriceLabel').textContent = sidebarLabel;

        history.replaceState(null, '', `?type=${type}`);
        applyFilters();
    }

    // ---- View Toggle ----
    function setView(view) {
        currentView = view;
        const grid = document.getElementById('listingGrid');
        grid.classList.toggle('list-view', view === 'list');
        document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
        document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
    }

    // ---- Debounced filter ----
    let filterTimer = null;
    function applyFiltersDebounced() {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(() => applyFilters(), 500);
    }

    // ---- Apply Filters ----
    async function applyFilters() {
        currentPage = 1;
        await loadListings();
    }

    // Ortak filtreler (oda, fiyat, alan, tür, özellikler)
    function applyBaseFilters(q) {
        const heroRooms = document.getElementById('searchRooms').value;
        const checkedRooms = [...document.querySelectorAll('#roomFilter input:checked')].map(i => i.value);
        if (heroRooms) q = q.eq('room_count', heroRooms);
        else if (checkedRooms.length > 0) q = q.in('room_count', checkedRooms);
        const maxPriceHero = document.getElementById('searchMaxPrice').value;
        const minPrice = document.getElementById('filterMinPrice').value;
        const maxPrice = document.getElementById('filterMaxPrice').value;
        if (maxPriceHero) q = q.lte('price', parseFloat(maxPriceHero));
        if (minPrice) q = q.gte('price', parseFloat(minPrice));
        if (maxPrice) q = q.lte('price', parseFloat(maxPrice));
        const minArea = document.getElementById('filterMinArea').value;
        const maxArea = document.getElementById('filterMaxArea').value;
        if (minArea) q = q.gte('area_net', parseInt(minArea));
        if (maxArea) q = q.lte('area_net', parseInt(maxArea));
        const propType = document.getElementById('filterPropertyType').value;
        if (propType) q = q.eq('property_type', propType);
        const buildingAge = document.getElementById('filterBuildingAge').value;
        if (buildingAge) q = q.eq('building_age', buildingAge);
        if (document.getElementById('fElevator').checked) q = q.eq('has_elevator', true);
        if (document.getElementById('fParking').checked) q = q.eq('has_parking', true);
        if (document.getElementById('fFurnished').checked) q = q.eq('is_furnished', true);
        if (document.getElementById('fComplex').checked) q = q.eq('is_in_complex', true);
        if (document.getElementById('fPets').checked) q = q.eq('allows_pets', true);
        return q;
    }

    async function loadListings() {
        const grid = document.getElementById('listingGrid');
        grid.innerHTML = '<div class="state-msg"><div class="skeleton" style="width:100%;height:200px;border-radius:12px;"></div></div>';

        try {
            const cityHidden = (document.getElementById('searchCity').value || '').trim();
            const cityVisible = (document.getElementById('searchCityInput').value || '').trim();
            const cityText = cityHidden || cityVisible;
            const districtHidden = (document.getElementById('searchDistrict').value || '').trim();
            const districtVisible = (document.getElementById('searchDistrictInput').value || '').trim();
            const districtText = districtHidden || districtVisible;

            const cityVariants = cityText ? (() => {
                const v = [cityText];
                if (cityText.includes('İ')) v.push(cityText.replace(/İ/g, 'I'));
                if (cityText.includes('I') && !cityText.includes('İ')) v.push(cityText.replace(/I/g, 'İ'));
                return [...new Set(v)];
            })() : [];
            const districtVariants = districtText ? (() => {
                const v = [districtText];
                if (districtText.includes('İ')) v.push(districtText.replace(/İ/g, 'I'));
                if (districtText.includes('I') && !districtText.includes('İ')) v.push(districtText.replace(/I/g, 'İ'));
                return [...new Set(v)];
            })() : [];

            const hasCityFilter = cityVariants.length > 0;
            const hasDistrictFilter = districtVariants.length > 0;

            let listings = [];
            let totalCount = 0;

            if (hasCityFilter || hasDistrictFilter) {
                // city_name ve district_name TEXT kolonu — ilike ile Türkçe karakter duyarsız arama
                let query = supabase
                    .from('emlak_listings')
                    .select('*, city:cities(name), district:districts(name)', { count: 'exact' })
                    .eq('listing_type', currentType)
                    .eq('status', 'active');

                if (hasCityFilter) query = query.ilike('city_name', `%${cityText}%`);
                if (hasDistrictFilter) query = query.ilike('district_name', `%${districtText}%`);
                query = applyBaseFilters(query);

                const sort = document.getElementById('sortSelect').value;
                if (sort === 'price_asc') query = query.order('price', { ascending: true });
                else if (sort === 'price_desc') query = query.order('price', { ascending: false });
                else if (sort === 'area_desc') query = query.order('area_net', { ascending: false });
                else query = query.order('created_at', { ascending: false });
                query = query.order('is_featured', { ascending: false });

                const from = (currentPage - 1) * PAGE_SIZE;
                query = query.range(from, from + PAGE_SIZE - 1);

                const { data, count, error } = await query;
                if (error) throw error;
                listings = data || [];
                totalCount = count || 0;
            } else {
                // Şehir/ilçe filtresi yok — tek sorgu
                let query = supabase
                    .from('emlak_listings')
                    .select('*, city:cities(name), district:districts(name)', { count: 'exact' })
                    .eq('listing_type', currentType)
                    .eq('status', 'active');
                query = applyBaseFilters(query);
                const sort = document.getElementById('sortSelect').value;
                if (sort === 'price_asc') query = query.order('price', { ascending: true });
                else if (sort === 'price_desc') query = query.order('price', { ascending: false });
                else if (sort === 'area_desc') query = query.order('area_net', { ascending: false });
                else query = query.order('created_at', { ascending: false });
                query = query.order('is_featured', { ascending: false });
                const from = (currentPage - 1) * PAGE_SIZE;
                query = query.range(from, from + PAGE_SIZE - 1);
                const { data, count, error } = await query;
                if (error) throw error;
                listings = data || [];
                totalCount = count || 0;
            }

            renderListings(listings, totalCount);
        } catch(e) {
            console.error(e);
            grid.innerHTML = `<div class="state-msg">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p>İlanlar yüklenirken hata oluştu.</p>
            </div>`;
        }
    }

    function renderListings(listings, count) {
        const grid = document.getElementById('listingGrid');
        const typeLabel = currentType === 'kiralik' ? 'Kiralık' : 'Satılık';
        document.getElementById('resultsCount').innerHTML = `<strong>${count}</strong> ${typeLabel} ilan bulundu`;

        if (listings.length === 0) {
            grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <p>Bu kriterlere uygun ilan bulunamadı.</p>
                <button onclick="resetFilters()" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:0.6rem 1.2rem;cursor:pointer;font-weight:600;">Filtreleri Temizle</button>
            </div>`;
            renderPagination(count);
            return;
        }

        grid.innerHTML = listings.map(l => {
            const price = Number(l.price).toLocaleString('tr-TR');
            const priceSuffix = currentType === 'kiralik' ? '/ay' : '';
            const location = [l.district_name, l.city_name].filter(Boolean).join(', ') || [l.district?.name, l.city?.name].filter(Boolean).join(', ');
            const img = l.cover_image
                ? `<img class="card-img" src="${l.cover_image}" alt="${l.title}" loading="lazy">`
                : `<div class="card-img-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>`;

            return `<a href="emlak-detail.html?id=${l.id}" class="listing-card">
                <div class="card-img-wrapper">
                    ${img}
                    <div class="card-badge-row">
                        <span class="badge badge-${currentType}">${currentType === 'kiralik' ? 'Kiralık' : 'Satılık'}</span>
                        ${l.room_count ? `<span class="badge badge-rooms">${l.room_count}</span>` : ''}
                        ${l.is_featured ? `<span class="badge badge-featured">Öne Çıkan</span>` : ''}
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${l.title}</div>
                    ${location ? `<div class="card-location"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${location}</div>` : ''}
                    <div class="card-price">₺${price} <span>${priceSuffix}</span></div>
                    <div class="card-specs">
                        ${l.area_net ? `<span class="card-spec"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3v18h18V3z"/><path d="M3 9h18M9 21V9"/></svg> ${l.area_net} m²</span>` : ''}
                        ${l.room_count ? `<span class="card-spec"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> ${l.room_count}</span>` : ''}
                        ${l.floor_number !== null && l.floor_number !== undefined ? `<span class="card-spec"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> ${l.floor_number}. Kat</span>` : ''}
                        ${l.is_furnished ? `<span class="card-spec">🛋️ Eşyalı</span>` : ''}
                    </div>
                </div>
            </a>`;
        }).join('');

        renderPagination(count);
    }

    function renderPagination(total) {
        const totalPages = Math.ceil(total / PAGE_SIZE);
        const pag = document.getElementById('pagination');
        if (totalPages <= 1) { pag.innerHTML = ''; return; }

        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        }
        pag.innerHTML = html;
    }

    async function goPage(page) {
        currentPage = page;
        await loadListings();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFilters() {
        document.getElementById('searchCityInput').value = '';
        document.getElementById('searchCity').value = '';
        resetDistrictDropdown();
        document.getElementById('searchRooms').value = '';
        document.getElementById('searchMaxPrice').value = '';
        document.getElementById('filterMinPrice').value = '';
        document.getElementById('filterMaxPrice').value = '';
        document.getElementById('filterMinArea').value = '';
        document.getElementById('filterMaxArea').value = '';
        document.getElementById('filterPropertyType').value = '';
        document.getElementById('filterBuildingAge').value = '';
        document.querySelectorAll('#roomFilter input').forEach(i => i.checked = false);
        document.getElementById('fElevator').checked = false;
        document.getElementById('fParking').checked = false;
        document.getElementById('fFurnished').checked = false;
        document.getElementById('fComplex').checked = false;
        document.getElementById('fPets').checked = false;
        applyFilters();
    }
</script>
</body>
</html>
